          + '<div class="tl" style="position:absolute;left:0;top:12px;bottom:12px;width:2px;border-radius:2px;background:'+c.accent+';"></div>'
          + jobsHtml
        + '</div>'
      + '</div>'
      // SKILLS
      + '<div class="rv" style="max-width:1080px;margin:0 auto;padding:clamp(70px,10vw,130px) clamp(20px,4vw,40px) 0;">'
        + '<div style="font-size:13px;font-weight:700;color:'+c.accent+';margin-bottom:28px;">'+esc(t.skillsLabel)+'</div>'
        + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:clamp(24px,3vw,40px);">'+skillsHtml+'</div>'
      + '</div>'
      // PROJECTS
      + '<div class="rv" style="max-width:1080px;margin:0 auto;padding:clamp(70px,10vw,130px) clamp(20px,4vw,40px) 0;">'
        + '<div style="font-size:13px;font-weight:700;color:'+c.accent+';margin-bottom:28px;">'+esc(t.projLabel)+'</div>'
        + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;">'+projHtml+'</div>'
      + '</div>'
      // EDUCATION
      + '<div class="rv" style="max-width:1080px;margin:0 auto;padding:clamp(70px,10vw,130px) clamp(20px,4vw,40px) clamp(80px,12vw,140px);">'
        + '<div style="font-size:13px;font-weight:700;color:'+c.accent+';margin-bottom:28px;">'+esc(t.eduLabel)+'</div>'
        + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:clamp(24px,3vw,40px);">'+eduHtml+'</div>'
      + '</div>'
      // FOOTER
      + '<div style="background:'+c.footerBg+';"><div class="rv" style="max-width:1080px;margin:0 auto;padding:clamp(70px,10vw,120px) clamp(20px,4vw,40px);">'
        + '<div style="font-size:clamp(32px,5.5vw,56px);font-weight:800;letter-spacing:-0.035em;max-width:700px;line-height:1.1;text-wrap:pretty;">'+esc(t.footTitle)+' <span style="color:'+c.accent+';">'+esc(t.footEm)+'</span></div>'
        + '<div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:36px;">'
          + '<a href="mailto:sagirogluhakan@outlook.com" data-mag="1" style="font-size:14px;font-weight:700;padding:14px 28px;border-radius:999px;background:'+c.accent+';color:#fff;transition:transform 0.25s cubic-bezier(0.22,1,0.36,1);">sagirogluhakan@outlook.com</a>'
          + '<a href="tel:+905550165335" data-mag="1" style="font-size:14px;font-weight:700;padding:14px 28px;border-radius:999px;border:1.5px solid '+c.line+';color:'+c.fgSoft+';transition:transform 0.25s cubic-bezier(0.22,1,0.36,1);">+90 555 016 53 35</a>'
          + '<button data-print="1" data-mag="1" class="no-print" style="cursor:pointer;font-size:14px;font-weight:700;padding:14px 28px;border-radius:999px;border:1.5px solid '+c.line+';background:transparent;color:'+c.fgSoft+';transition:transform 0.25s cubic-bezier(0.22,1,0.36,1);">'+esc(t.download)+' ↓</button>'
        + '</div>'
        + '<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-top:clamp(50px,7vw,80px);padding-top:24px;border-top:1px solid '+c.line+';font-family:'+MONO+';font-size:12px;color:'+c.fgMut+';"><span>© 2026 Hakan Sağıroğlu</span><span>Bursa, TR · '+esc(t.remote)+'</span></div>'
      + '</div></div>'
      + '</div>';

    var app = document.getElementById('app');
    app.innerHTML = html;
    document.documentElement.lang = lang;
    wire(c);
    fx();
  }

  function save(next) {
    Object.assign(state, next);
    try { localStorage.setItem('hs-cv3-prefs', JSON.stringify({ lang: state.lang, dark: state.dark })); } catch (e) {}
    render();
  }

  function wire(c) {
    document.querySelectorAll('[data-lang]').forEach(function(b){ b.onclick = function(){ save({ lang: b.getAttribute('data-lang') }); }; });
    var th = document.querySelector('[data-theme]'); if (th) th.onclick = function(){ save({ dark: !state.dark }); };
    var pr = document.querySelector('[data-print]'); if (pr) pr.onclick = function(){ window.print(); };
    document.querySelectorAll('[data-job]').forEach(function(el){
      el.onclick = function(){ var i = el.getAttribute('data-job'); state.open[i] = !state.open[i]; render(); };
    });
    document.querySelectorAll('.chip').forEach(function(el){
      el.onmouseenter = function(){ el.style.background = c.accent; el.style.color = '#fff'; };
      el.onmouseleave = function(){ el.style.background = c.chipBg; el.style.color = c.fgSoft; };
    });
  }

  var done = new WeakSet();
  function fx() {
    document.querySelectorAll('[data-stat]').forEach(function(el){
      if (done.has(el)) return; done.add(el);
      var io = new IntersectionObserver(function(es){
        es.forEach(function(en){
          if (!en.isIntersecting) return; io.disconnect();
          var final = el.textContent, m = final.match(/(\d+)/); if (!m) return;
          var target = parseInt(m[1],10), t0 = performance.now(), dur = 1300;
          function step(now){ var p = Math.min(1,(now-t0)/dur), e = 1-Math.pow(1-p,3);
            el.textContent = final.replace(m[1], String(Math.round(target*e)));
            if (p<1) requestAnimationFrame(step); }
          requestAnimationFrame(step);
        });
      }, { threshold: 0.5 });
      io.observe(el);
    });
    document.querySelectorAll('[data-mag]').forEach(function(el){
      if (done.has(el)) return; done.add(el);
      el.addEventListener('pointermove', function(ev){
        var r = el.getBoundingClientRect();
        var dx = Math.max(-8, Math.min(8, (ev.clientX - r.left - r.width/2)*0.22));
        var dy = Math.max(-6, Math.min(6, (ev.clientY - r.top - r.height/2)*0.35));
        el.style.transform = 'translate('+dx+'px,'+dy+'px)';
      });
      el.addEventListener('pointerleave', function(){ el.style.transform = 'translate(0px,0px)'; });
    });
  }

  render();
})();
</script>
